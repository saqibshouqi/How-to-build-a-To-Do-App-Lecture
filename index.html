<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To Do App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <h1>To Do App</h1>
    <form id="todo-form">
      <input id="todo-input" placeholder="What needs to be done?" autocomplete="off" />
      <button id="add-btn" aria-label="Add todo">Add</button>
    </form>

    <section class="controls">
      <div class="filters">
        <button data-filter="all" class="filter active">All</button>
        <button data-filter="active" class="filter">Active</button>
        <button data-filter="completed" class="filter">Completed</button>
      </div>
      <button id="clear-completed">Clear completed</button>
    </section>

    <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

    <footer class="footer">
      <span id="count"></span>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
